name: Release Builds

# Triggers on any tag matching:
#   v1.0.0           → stable release
#   v1.0.0-alpha.1   → alpha pre-release
#   v1.0.0-beta.1    → beta pre-release
#   v1.0.0-rc.1      → release candidate pre-release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  WORKING_DIR: tyrian_mobile
  FLUTTER_VERSION: '3.29.3'

# ──────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 0. Parse tag → version / release_type / is_prerelease ──────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version:       ${{ steps.parse.outputs.version }}
      build_number:  ${{ steps.parse.outputs.build_number }}
      is_prerelease: ${{ steps.parse.outputs.is_prerelease }}
      release_type:  ${{ steps.parse.outputs.release_type }}
    steps:
      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v1.2.3-beta.1
          VERSION="${TAG#v}"                # strip leading "v"
          # Build number = run number so each CI build is unique
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"

          echo "version=$VERSION"           >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

          if   [[ "$TAG" == *"-alpha"* ]]; then
            echo "is_prerelease=true"   >> "$GITHUB_OUTPUT"
            echo "release_type=Alpha"   >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == *"-beta"* ]]; then
            echo "is_prerelease=true"   >> "$GITHUB_OUTPUT"
            echo "release_type=Beta"    >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == *"-rc"* ]]; then
            echo "is_prerelease=true"   >> "$GITHUB_OUTPUT"
            echo "release_type=RC"      >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false"  >> "$GITHUB_OUTPUT"
            echo "release_type=Release" >> "$GITHUB_OUTPUT"
          fi

  # ── 1. Android ─────────────────────────────────────────────────────────────
  build-android:
    name: Build Android (APK + AAB)
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      # Optional release signing – configure these repository secrets to enable:
      #   ANDROID_KEYSTORE_BASE64   base64-encoded .jks / .keystore file
      #   ANDROID_STORE_PASSWORD    keystore password
      #   ANDROID_KEY_ALIAS         key alias
      #   ANDROID_KEY_PASSWORD      key password
      - name: Set up Android signing
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        working-directory: ${{ env.WORKING_DIR }}/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore
          cat > key.properties << EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=release.keystore
          EOF

      - name: Build APK
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          flutter build apk --release \
            --build-name="${{ needs.prepare.outputs.version }}" \
            --build-number="${{ needs.prepare.outputs.build_number }}"

      - name: Build AAB
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          flutter build appbundle --release \
            --build-name="${{ needs.prepare.outputs.version }}" \
            --build-number="${{ needs.prepare.outputs.build_number }}"

      - name: Stage artifacts
        run: |
          V="${{ needs.prepare.outputs.version }}"
          mkdir staging
          cp "${{ env.WORKING_DIR }}/build/app/outputs/flutter-apk/app-release.apk" \
             "staging/kiran-${V}-android.apk"
          cp "${{ env.WORKING_DIR }}/build/app/outputs/bundle/release/app-release.aab" \
             "staging/kiran-${V}-android.aab"

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: staging/

  # ── 2. iOS ─────────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: ${{ env.WORKING_DIR }}/ios
        run: pod install --repo-update

      # Optional code signing – configure these repository secrets to enable:
      #   IOS_P12_BASE64              base64-encoded .p12 distribution certificate
      #   IOS_P12_PASSWORD            .p12 password
      #   IOS_KEYCHAIN_PASSWORD       temp keychain password (any random string)
      #   IOS_PROVISION_PROFILE_BASE64 base64-encoded .mobileprovision
      - name: Import iOS certificate & provisioning profile
        if: ${{ env.IOS_P12_BASE64 != '' }}
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
        run: |
          KC="$RUNNER_TEMP/release.keychain"
          security create-keychain -p "${{ secrets.IOS_KEYCHAIN_PASSWORD }}" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "${{ secrets.IOS_KEYCHAIN_PASSWORD }}" "$KC"

          CERT="$RUNNER_TEMP/cert.p12"
          echo "${{ secrets.IOS_P12_BASE64 }}" | base64 -d > "$CERT"
          security import "$CERT" -P "${{ secrets.IOS_P12_PASSWORD }}" \
            -A -t cert -f pkcs12 -k "$KC"
          security list-keychain -d user -s "$KC"

          PP="$RUNNER_TEMP/profile.mobileprovision"
          echo "${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}" | base64 -d > "$PP"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP" ~/Library/MobileDevice/Provisioning\ Profiles/

      # Signed IPA (requires secrets configured above)
      - name: Build signed IPA
        if: ${{ env.IOS_P12_BASE64 != '' }}
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          flutter build ipa --release \
            --build-name="${{ needs.prepare.outputs.version }}" \
            --build-number="${{ needs.prepare.outputs.build_number }}"

      # Unsigned build (no secrets needed – suitable for AdHoc distribution / sideloading)
      - name: Build unsigned iOS archive
        if: ${{ env.IOS_P12_BASE64 == '' }}
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          flutter build ios --release --no-codesign \
            --build-name="${{ needs.prepare.outputs.version }}" \
            --build-number="${{ needs.prepare.outputs.build_number }}"

      - name: Stage artifacts
        run: |
          V="${{ needs.prepare.outputs.version }}"
          mkdir staging

          # Signed IPA
          IPA=$(find "${{ env.WORKING_DIR }}/build/ios/ipa" -name "*.ipa" 2>/dev/null | head -1)
          if [[ -n "$IPA" ]]; then
            cp "$IPA" "staging/kiran-${V}-ios.ipa"
          fi

          # Unsigned .app bundle → zip
          APP=$(find "${{ env.WORKING_DIR }}/build/ios/iphoneos" -name "*.app" -maxdepth 1 2>/dev/null | head -1)
          if [[ -n "$APP" ]]; then
            cd "${{ env.WORKING_DIR }}/build/ios/iphoneos"
            zip -r "$OLDPWD/staging/kiran-${V}-ios-unsigned.zip" "$(basename "$APP")"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: staging/

  # ── 3. macOS ────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      # macos/ platform directory is not committed – generate from Flutter templates
      - name: Generate macOS platform directory
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter create --platforms macos .

      - name: Build macOS
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          flutter build macos --release \
            --build-name="${{ needs.prepare.outputs.version }}" \
            --build-number="${{ needs.prepare.outputs.build_number }}"

      - name: Create DMG
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          V="${{ needs.prepare.outputs.version }}"
          APP="build/macos/Build/Products/Release/tyrian_mobile.app"
          DMG="kiran-${V}-macos.dmg"

          brew install create-dmg 2>/dev/null || true

          create-dmg \
            --volname "Kiran ${V}" \
            --window-pos 200 120 \
            --window-size 560 380 \
            --icon-size 100 \
            --app-drop-link 400 185 \
            "$DMG" "$APP" \
          || hdiutil create \
               -volname "Kiran ${V}" \
               -srcfolder "$APP" \
               -ov -format UDZO \
               "$DMG"

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: ${{ env.WORKING_DIR }}/kiran-*.dmg

  # ── 4. Windows ──────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      - name: Build Windows
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          flutter build windows --release `
            --build-name="${{ needs.prepare.outputs.version }}" `
            --build-number="${{ needs.prepare.outputs.build_number }}"

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $V   = "${{ needs.prepare.outputs.version }}"
          $Src = "${{ env.WORKING_DIR }}\build\windows\x64\runner\Release"
          $Dst = "kiran-${V}-windows.zip"
          Compress-Archive -Path "$Src\*" -DestinationPath $Dst

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: kiran-*.zip

  # ── 5. Linux ────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev \
            libglib2.0-dev libpango1.0-dev libcairo2-dev \
            libasound2-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      # linux/ platform directory is not committed – generate from Flutter templates
      - name: Generate Linux platform directory
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter create --platforms linux .

      - name: Build Linux
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          flutter build linux --release \
            --build-name="${{ needs.prepare.outputs.version }}" \
            --build-number="${{ needs.prepare.outputs.build_number }}"

      - name: Create TAR.GZ archive
        run: |
          V="${{ needs.prepare.outputs.version }}"
          BUNDLE="${{ env.WORKING_DIR }}/build/linux/x64/release/bundle"
          tar -czf "kiran-${V}-linux.tar.gz" -C "$BUNDLE" .

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: kiran-*.tar.gz

  # ── 6. Create GitHub Release ─────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-android
      - build-ios
      - build-macos
      - build-windows
      - build-linux
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lh release-assets/

      - name: Extract changelog notes
        id: notes
        run: |
          V="${{ needs.prepare.outputs.version }}"
          TYPE="${{ needs.prepare.outputs.release_type }}"

          # Try to pull the matching section from CHANGELOG.md
          NOTES=$(awk "/^## \[?${V}\]?/,/^## \[?[0-9]/" CHANGELOG.md 2>/dev/null \
                  | sed '1d;$d' | sed '/^[[:space:]]*$/d') || true

          if [[ -z "$NOTES" ]]; then
            NOTES="**Kiran ${TYPE} ${V}**"
          fi

          {
            echo 'BODY<<EOF'
            echo "$NOTES"
            echo ''
            echo '---'
            echo '### Platforms'
            echo '| Platform | File |'
            echo '|----------|------|'
            echo "| Android APK | \`kiran-${V}-android.apk\` |"
            echo "| Android AAB | \`kiran-${V}-android.aab\` |"
            echo "| iOS (signed) | \`kiran-${V}-ios.ipa\` *(if signing secrets set)* |"
            echo "| iOS (unsigned) | \`kiran-${V}-ios-unsigned.zip\` *(if no signing secrets)* |"
            echo "| macOS | \`kiran-${V}-macos.dmg\` |"
            echo "| Windows | \`kiran-${V}-windows.zip\` |"
            echo "| Linux | \`kiran-${V}-linux.tar.gz\` |"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ github.ref_name }}
          name:                   "Kiran ${{ needs.prepare.outputs.release_type }} ${{ needs.prepare.outputs.version }}"
          body:                   ${{ steps.notes.outputs.BODY }}
          prerelease:             ${{ needs.prepare.outputs.is_prerelease }}
          draft:                  false
          generate_release_notes: true
          files:                  release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
