name: iOS TestFlight

# Builds a signed iOS IPA and uploads it to TestFlight via the App Store
# Connect API. Triggers on the same tag pattern as the main release workflow
# (v*) and can be invoked manually for ad-hoc TestFlight pushes.
#
# Required repository secrets:
#   IOS_P12_BASE64                base64-encoded .p12 distribution certificate
#   IOS_P12_PASSWORD              .p12 password
#   IOS_KEYCHAIN_PASSWORD         temp keychain password (any random string)
#   IOS_PROVISION_PROFILE_BASE64  base64-encoded App Store .mobileprovision
#   APPSTORE_ISSUER_ID            App Store Connect API issuer id (UUID)
#   APPSTORE_API_KEY_ID           App Store Connect API key id
#   APPSTORE_API_PRIVATE_KEY      contents of the AuthKey_<id>.p8 file
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_name:
        description: 'CFBundleShortVersionString (e.g. 1.2.3). Defaults to tag.'
        required: false
        type: string

env:
  WORKING_DIR: tyrian_mobile
  FLUTTER_VERSION: '3.29.3'

jobs:
  testflight:
    name: Build & upload to TestFlight
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ -n "${{ inputs.build_name }}" ]]; then
            VERSION="${{ inputs.build_name }}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          fi
          # Strip prerelease suffix for CFBundleShortVersionString – Apple
          # only accepts numeric x.y.z. Build number stays unique via run id.
          SHORT="${VERSION%%-*}"
          echo "version=$SHORT"               >> "$GITHUB_OUTPUT"
          echo "build_number=$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: ${{ env.WORKING_DIR }}/ios
        run: pod install --repo-update

      - name: Import signing certificate & provisioning profile
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          KC="$RUNNER_TEMP/release.keychain"
          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KC"

          CERT="$RUNNER_TEMP/cert.p12"
          echo "$IOS_P12_BASE64" | base64 -d > "$CERT"
          security import "$CERT" -P "$IOS_P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KC"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$IOS_KEYCHAIN_PASSWORD" "$KC"
          security list-keychain -d user -s "$KC" $(security list-keychain -d user | xargs)

          PP="$RUNNER_TEMP/profile.mobileprovision"
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 -d > "$PP"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build signed IPA (App Store)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          flutter build ipa --release \
            --export-method=app-store \
            --build-name="${{ steps.version.outputs.version }}" \
            --build-number="${{ steps.version.outputs.build_number }}"

      - name: Locate IPA
        id: ipa
        run: |
          IPA=$(find "${{ env.WORKING_DIR }}/build/ios/ipa" -name "*.ipa" | head -1)
          if [[ -z "$IPA" ]]; then
            echo "::error::No .ipa produced by flutter build ipa"
            exit 1
          fi
          echo "path=$IPA" >> "$GITHUB_OUTPUT"

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ steps.ipa.outputs.path }}
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-testflight
          path: ${{ steps.ipa.outputs.path }}
